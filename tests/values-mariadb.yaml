mariadb:
  rootPasswordSecretKeyRef:
    name: mariadb-root
    key: password
  storage:
    size: 10Gi
  replicas: 1
  galera:
    enabled: false
  myCnf: |
    [mariadb]
    bind-address=*
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2
    innodb_buffer_pool_size=4096M
    innodb_lock_wait_timeout=900
    innodb_log_file_size=1024M
    max_allowed_packet=256M
  metrics:
    enabled: true
databases:
  - name: slurmdb
    characterSet: utf8
    collate: utf8_general_ci
    cleanupPolicy: Delete
    requeueInterval: 10h
    retryInterval: 30s
users:
  - name: slurm
    passwordSecretKeyRef:
      name: mariadb-password
      key: password
    host: "%"
    cleanupPolicy: Delete
    requeueInterval: 10h
    retryInterval: 30s
grants:
  - name: slurmdb
    privileges:
      - "ALL PRIVILEGES"
    database: "slurmdb"
    table: "*"
    username: slurm
    grantOption: true
    host: "%"
    cleanupPolicy: Delete
    requeueInterval: 10h
    retryInterval: 30s
