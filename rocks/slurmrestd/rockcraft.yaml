name: slurmrestd
version: 25.05.3
summary: The Slurm REST API daemon
description: |
  slurmrestd is the REST API interface for Slurm.

base: ubuntu@24.04
platforms:
  amd64:
package-repositories:
  - type: apt
    ppa: ubuntu-hpc/slurm-wlm-25.05

services:
  slurmrestd:
    override: replace
    startup: enabled
    command: /usr/sbin/slurmrestd [ -u slurm -g slurm 0.0.0.0:6820 ]
    backoff-delay: 5s
    environment:
      SLURM_JWT: daemon

# Slinky provides arguments to the entrypoint directly, so we need to use an
# entry point service to receive those arguments.
entrypoint-service: slurmrestd

parts:
  slurmrestd:
    plugin: nil
    overlay-packages:
      - slurmrestd
      - slurm-wlm-plugins
    overlay-script: |
      chroot $CRAFT_OVERLAY usermod -u 401 slurm
      chroot $CRAFT_OVERLAY groupmod -g 401 slurm
      chroot $CRAFT_OVERLAY find / -xdev -uid 64030 -exec chown 401 '{}' \+
      chroot $CRAFT_OVERLAY find / -xdev -gid 64030 -exec chown 401 '{}' \+
