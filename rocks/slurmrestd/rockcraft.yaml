name: slurmrestd
version: "25.11"
summary: The Slurm REST API daemon
description: |
  slurmrestd is the REST API interface for Slurm.

base: bare
build-base: ubuntu@24.04
platforms:
  amd64:
package-repositories:
  - type: apt
    components: [main, main/debug]
    suites: [noble]
    key-id: AE87121DC3E4A0B0F81FF023F6D0C5D5C6BEB37B
    url: https://ppa.launchpadcontent.net/ubuntu-hpc/slurm-wlm-25.11/ubuntu

services:
  slurmrestd:
    override: replace
    startup: enabled
    command: /usr/sbin/slurmrestd [ 0.0.0.0:6820 -v ]
    backoff-delay: 5s

# Slinky provides arguments to the entrypoint directly, so we need to use an
# entry point service to receive those arguments.
entrypoint-service: slurmrestd

parts:
  slurm-user:
    plugin: nil
    stage-packages:
      # essentials (required for bare base)
      - base-passwd_data
      - base-files_base
    override-build: |
      craftctl default
      groupadd --root ${CRAFT_PART_INSTALL} --system --gid=401 slurm
      useradd --root ${CRAFT_PART_INSTALL} \
        --system --no-log-init \
        --uid=401 --gid=401 \
        --shell=/usr/sbin/nologin slurm

  slurmrestd:
    plugin: nil
    stage-packages:
      # base
      - procps
      - iputils-ping
      - ncurses-bin

      # slurmrestd
      - slurm-wlm-doc
      - slurmrestd
      - libslurm44t64
      - libslurm44t64-dbgsym
      - slurm-wlm-basic-plugins
      - slurm-wlm-basic-plugins-dbgsym
      - slurm-wlm-jwt-plugin
      - slurm-wlm-jwt-plugin-dbgsym
