name: login
version: "25.11"
summary: The Slurm login node
description: |
  login is an extension of the sackd node with additional services to support
  user login.

base: ubuntu@24.04
platforms:
  amd64:
package-repositories:
  - type: apt
    components: [main, main/debug]
    suites: [noble]
    key-id: AE87121DC3E4A0B0F81FF023F6D0C5D5C6BEB37B
    url: http://ppa.launchpadcontent.net/ubuntu-hpc/slurm-wlm-25.11/ubuntu

services:
  sackd:
    override: replace
    startup: enabled
    command: >
      /bin/bash -c 'exec /usr/sbin/fakesystemd.sh
      /usr/sbin/sackd --systemd ${SACKD_OPTIONS:-} "$@"' _
    kill-delay: 35s
    backoff-delay: 1s

  sshd:
    override: replace
    startup: enabled
    command: >
      /bin/bash -c 'ssh-keygen -A && exec /usr/sbin/sshd -D -e
      ${SSHD_OPTIONS:-} "$@"' _
    backoff-delay: 1s

  sssd:
    override: replace
    startup: enabled
    command: >
      /bin/bash -c 'exec /usr/sbin/sssd -i ${SSSD_OPTIONS:-} "$@"' _
    backoff-delay: 1s

parts:
  wrappers:
    plugin: dump
    source: ./scripts
    source-type: local
    organize:
      "*.sh": usr/sbin/

  sackd:
    plugin: nil
    overlay-packages:
      - sackd
      - slurm-client
      - slurm-wlm-plugins
    overlay-script: |
      chroot $CRAFT_OVERLAY usermod -u 401 slurm
      chroot $CRAFT_OVERLAY groupmod -g 401 slurm
      chroot $CRAFT_OVERLAY find / -xdev -uid 64030 -exec chown 401 '{}' \+
      chroot $CRAFT_OVERLAY find / -xdev -gid 64030 -exec chown 401 '{}' \+
      mkdir -p $CRAFT_OVERLAY/run/slurm
      chmod -R 755 $CRAFT_OVERLAY/run/slurm
      chroot $CRAFT_OVERLAY chown -R slurm:slurm /run/slurm

  auth:
    plugin: nil
    overlay-packages:
      # base
      - procps
      - iputils-ping
      - ncurses-bin
      # base-extra
      - openmpi-bin
      # sackd
      - socat
      - slurm-client
      - slurm-client-dbgsym
      - slurm-wlm-doc
      - sackd
      - sackd-dbgsym
      - slurm-wlm-basic-plugins
      - slurm-wlm-basic-plugins-dbgsym
      - libslurm44t64
      - libslurm44t64-dbgsym
      # login
      - openssh-server
      - authselect
      - sssd
      - sssd-ad
      - sssd-ldap
      - libpam-sss
      - libnss-sss
    overlay-script: |
      mkdir -p \
        $CRAFT_OVERLAY/run/sshd \
        $CRAFT_OVERLAY/etc/authselect
      chmod 0755 $CRAFT_OVERLAY/run/sshd
      chroot $CRAFT_OVERLAY authselect select sssd with-mkhomedir --force
      rm -f $CRAFT_OVERLAY/etc/ssh/ssh_host_*
