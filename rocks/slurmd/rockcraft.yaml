name: slurmd
version: "25.11"
summary: The Slurm compute node daemon
description: |
  slurmd is the compute node daemon of Slurm. It monitors all tasks running
  on the compute node, accepts work (tasks), launches tasks, and kills running
  tasks upon request.

base: ubuntu@24.04
platforms:
  amd64:
package-repositories:
  - type: apt
    components: [main, main/debug]
    suites: [noble]
    key-id: AE87121DC3E4A0B0F81FF023F6D0C5D5C6BEB37B
    url: http://ppa.launchpadcontent.net/ubuntu-hpc/slurm-wlm-25.11/ubuntu

services:
  slurmd:
    override: replace
    startup: enabled
    command: /usr/sbin/entrypoint.sh [ -v ]
    kill-delay: 35s
    backoff-delay: 1s

  sshd:
    override: replace
    startup: enabled
    command: >
      /bin/bash -c 'ssh-keygen -A && exec /usr/sbin/sshd -D -e
      ${SSHD_OPTIONS:-} "$@"' _
    backoff-delay: 1s

  sssd:
    override: replace
    startup: enabled
    command: >
      /bin/bash -c 'exec /usr/sbin/sssd -i ${SSSD_OPTIONS:-} "$@"' _
    backoff-delay: 1s

# Slinky provides arguments to the entrypoint directly, so we need to use an
# entry point service to receive those arguments.
entrypoint-service: slurmd

parts:
  scripts:
    plugin: dump
    source: ./scripts
    source-type: local
    organize:
      "*.sh": usr/sbin/

  slurmd:
    plugin: nil
    overlay-packages:
      # base
      - procps
      - iputils-ping
      - ncurses-bin

      # base-extra
      - openmpi-bin

      # slurmd
      - authselect
      - gawk
      - socat
      - openssh-server
      - sssd
      - sssd-ad
      - sssd-ldap
      - libpam-sss
      - libnss-sss
      - slurm-client
      - slurm-client-dbgsym
      - libslurm-dev
      - slurm-wlm-doc
      - libnss-slurm
      - libpam-slurm-adopt
      - libpmi2-0t64
      - slurmd
      - slurmd-dbgsym
      - libslurm44t64
      - libslurm44t64-dbgsym
      - slurm-wlm-basic-plugins-dbgsym
    overlay-script: |
      # Switch from Debian's `slurm` ID (64030) to what Slinky expects (401)
      chroot $CRAFT_OVERLAY usermod -u 401 slurm
      chroot $CRAFT_OVERLAY groupmod -g 401 slurm
      chroot $CRAFT_OVERLAY find / -xdev -uid 64030 -exec chown 401 '{}' \+
      chroot $CRAFT_OVERLAY find / -xdev -gid 64030 -exec chown 401 '{}' \+
      # Slinky-specific
      mkdir -p \
        $CRAFT_OVERLAY/run/slurm \
        $CRAFT_OVERLAY/var/spool/slurmd \
        $CRAFT_OVERLAY/run/sshd \
        $CRAFT_OVERLAY/etc/authselect
      chmod 0755 $CRAFT_OVERLAY/run/sshd
      chroot $CRAFT_OVERLAY authselect select sssd with-mkhomedir --force
      chroot $CRAFT_OVERLAY sed -i -E \
        "s/^passwd:[[:space:]]+/&slurm /g" /etc/nsswitch.conf
      chroot $CRAFT_OVERLAY sed -i -E \
        "s/^group:[[:space:]]+/&slurm /g" /etc/nsswitch.conf
      rm -f $CRAFT_OVERLAY/etc/ssh/ssh_host_*
