name: slurmdbd
version: "25.11"
summary: The Slurm database daemon
description: |
  slurmdbd provides a secure enterprise-wide interface to a database for Slurm.
  This is particularly useful for archiving accounting records.

base: ubuntu@24.04
platforms:
  amd64:
package-repositories:
  - type: apt
    components: [main, main/debug]
    suites: [noble]
    key-id: AE87121DC3E4A0B0F81FF023F6D0C5D5C6BEB37B
    url: http://ppa.launchpadcontent.net/ubuntu-hpc/slurm-wlm-25.11/ubuntu

services:
  slurmdbd:
    override: replace
    startup: enabled
    command: /usr/sbin/slurmdbd -D [ -v ]
    backoff-delay: 1s

# Slinky provides arguments to the entrypoint directly, so we need to use an
# entry point service to receive those arguments.
entrypoint-service: slurmdbd

parts:
  slurmdbd:
    plugin: nil
    overlay-packages:
      # base
      - procps
      - iputils-ping
      - ncurses-bin

      # slurmdbd
      - slurm-wlm-doc
      - slurmdbd
      - slurmdbd-dbgsym
      - slurm-wlm-jwt-plugin
      - slurm-wlm-jwt-plugin-dbgsym
      - libslurm44t64
      - libslurm44t64-dbgsym
      - slurm-wlm-basic-plugins-dbgsym
      - slurm-wlm-mysql-plugin-dbgsym
    overlay-script: |
      chroot $CRAFT_OVERLAY usermod -u 401 slurm
      chroot $CRAFT_OVERLAY groupmod -g 401 slurm
      chroot $CRAFT_OVERLAY find / -xdev -uid 64030 -exec chown 401 '{}' \+
      chroot $CRAFT_OVERLAY find / -xdev -gid 64030 -exec chown 401 '{}' \+
      mkdir -p \
        $CRAFT_OVERLAY/var/lib/slurm/checkpoint \
        $CRAFT_OVERLAY/run/slurmdbd
      chmod -R 755 $CRAFT_OVERLAY/var/lib/slurm $CRAFT_OVERLAY/run/slurmdbd
      chroot $CRAFT_OVERLAY chown -R slurm:slurm /var/lib/slurm /run/slurmdbd
