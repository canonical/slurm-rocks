name: slurmctld
version: "25.11"
summary: The Slurm central management daemon
description: |
  slurmctld is the central management daemon of Slurm. It monitors all other
  Slurm daemons and resources, accepts work (jobs), and allocates resources to
  those jobs. Given the critical functionality of slurmctld, there may be a
  backup server to assume these functions in the event that the primary server
  fails.

base: ubuntu@24.04
platforms:
  amd64:
package-repositories:
  - type: apt
    components: [main, main/debug]
    suites: [noble]
    key-id: AE87121DC3E4A0B0F81FF023F6D0C5D5C6BEB37B
    url: http://ppa.launchpadcontent.net/ubuntu-hpc/slurm-wlm-25.11/ubuntu

services:
  slurmctld:
    override: replace
    startup: enabled
    command: >
      /bin/bash -c 'exec /usr/sbin/fakesystemd.sh
      /usr/sbin/slurmctld --systemd ${SLURMCTLD_OPTIONS:-} "$@"' _ [ -v ]
    kill-delay: 35s
    backoff-delay: 1s

# Slinky provides arguments to the entrypoint directly, so we need to use an
# entry point service to receive those arguments.
entrypoint-service: slurmctld

parts:
  scripts:
    plugin: dump
    source: ./scripts
    source-type: local
    organize:
      "*.sh": usr/sbin/

  slurmctld:
    plugin: nil
    overlay-packages:
      # base
      - procps
      - iputils-ping
      - ncurses-bin

      # slurmctld
      - socat
      - slurmctld
      - slurmctld-dbgsym
      - libslurm-dev
      - slurm-wlm-doc
      - slurm-wlm-jwt-plugin
      - slurm-wlm-jwt-plugin-dbgsym
      - libslurm44t64
      - libslurm44t64-dbgsym

      # dbgsym deps
      - slurm-client-dbgsym
      - slurm-wlm-basic-plugins-dbgsym

      # By default, the Slinky helm chart uses two instances of the `slurmctld`
      # container for the controller pod, one of them being the service and the
      # other one being the reconfigure detector, which uses `tini`. This is why
      # we require `tini` here.
      - tini
    overlay-script: |
      chroot $CRAFT_OVERLAY usermod -u 401 slurm
      chroot $CRAFT_OVERLAY groupmod -g 401 slurm
      chroot $CRAFT_OVERLAY find / -xdev -uid 64030 -exec chown 401 '{}' \+
      chroot $CRAFT_OVERLAY find / -xdev -gid 64030 -exec chown 401 '{}' \+
      mkdir -p \
        $CRAFT_OVERLAY/var/lib/slurm/checkpoint \
        $CRAFT_OVERLAY/run/slurmctld
      chmod -R 755 $CRAFT_OVERLAY/var/lib/slurm $CRAFT_OVERLAY/run/slurmctld
      chroot $CRAFT_OVERLAY chown -R slurm:slurm /var/lib/slurm /run/slurmctld
